<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Contact | Priyanshu Kumar</title>

  <link rel="stylesheet" href="./HOME.css">

  <!-- Font Awesome -->
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body>

  <!-- Navbar -->
  <nav id="navbar">
    <div class="container">
      <div class="logo">
        <img src="./nexora_logo.svg"alt="Logo">
        NEXORA</div>

      <ul class="nav-links" id="nav-links">
        <li><a href="./HOME.html" class="nav-item active">Home</a></li>
        <li><a href="about.html" class="nav-item">About</a></li>
        <li><a href="./skills.html" class="nav-item">Skills</a></li>

      </ul>

      <div class="hamburger" id="hamburger">
        <i class="fa-solid fa-bars"></i>
      </div>
    </div>
  </nav>


  <!-- CONTACT SECTION -->

  <section class="contact">

    <div class="contact-box">

      <h2>Contact Me </h2>

      <p class="contact-text">
        Feel free to share your view on my projects and contact me for collaborations,
        projects.
      </p>

     <form id="contact-form">

  <input type="text"
         name="name"
         placeholder="Your Name"
         required>

  <input type="email"
         name="email"
         placeholder="Your Email"
         required>

  <textarea name="message"
            rows="5"
            placeholder="Your Message"
            required></textarea>

  <button type="submit"
          class="btn">

    Send Message

  </button>

</form>

    </div>

  </section>
  
  <script src="HOME.js"></script>

</body>
